name: Deploy Staging

# To enable it:
#   1. Set DEPLOY_DOMAIN / DEPLOY_BRANCH below.
#   2. Add the repository secrets: SSH_HOST, SSH_USERNAME, SSH_PORT, SSH_KEY.
#   3. Uncomment the `push` trigger below.
on:
  # push:
  #   branches:
  #     - develop
  workflow_dispatch:

env:
  DEPLOY_DOMAIN: staging.example.com # TODO: your staging domain
  DEPLOY_BRANCH: develop

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          port: ${{ secrets.SSH_PORT }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            export DEPLOY_DOMAIN="${{ env.DEPLOY_DOMAIN }}"
            export DEPLOY_BRANCH="${{ env.DEPLOY_BRANCH }}"
            chmod +x /var/www/${{ env.DEPLOY_DOMAIN }}/.github/deploy.sh
            /var/www/${{ env.DEPLOY_DOMAIN }}/.github/deploy.sh staging
